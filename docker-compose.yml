services:
  web:
    image: php:8.2-apache
    container_name: apache
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./photos:/var/www/html/photos
    command:
      bash -c "chown -R www-data:www-data /var/www/html/photos && apache2-foreground"

  db:
    image: mariadb:11
    container_name: mariadb
    env_file:
      - path: ./.env
        required: true
    ports:
      - "3306:3306"
    volumes:
      - ./data:/var/lib/mysql

